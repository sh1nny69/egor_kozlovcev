<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Видео</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Заголовок -->
        <h1>Трейлер фильма</h1>

        <!-- Видео (РАБОЧЕЕ) -->
        <div class="video">
            <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/2LqzF5WauAw" 
            title="YouTube video" 
            frameborder="0" 
            allowfullscreen></iframe>
        </div>

        <!-- Если вдруг не загрузится -->
        <p>Если видео не отображается:</p>
        <a href="https://www.youtube.com/watch?v=2LqzF5WauAw" target="_blank" class="btn">
            Смотреть на YouTube
        </a>

        <br><br>

        <!-- Кнопка назад -->
        <a href="index.html" class="btn">Назад</a>

    </div>

</body>
</html>
